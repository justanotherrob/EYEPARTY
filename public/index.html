<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VA Bootcamp</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="scanlines"></div>

  <!-- Full-screen feedback overlay -->
  <div id="feedback-overlay" class="feedback-overlay">
    <div id="feedback-icon" class="feedback-icon"></div>
    <div id="feedback-text" class="feedback-text"></div>
    <div id="feedback-points" class="feedback-points"></div>
  </div>

  <!-- SCREEN 1: Name Entry -->
  <div id="screen-start" class="screen active">
    <div class="hero-e">E</div>
    <h1 class="title">VA BOOTCAMP</h1>
    <p class="subtitle">Test your visual acuity knowledge</p>
    <div class="name-form">
      <input type="text" id="name-input" placeholder="ENTER YOUR NAME" maxlength="30" autocomplete="off">
      <button id="start-btn" class="btn-primary">START EXAM</button>
    </div>
  </div>

  <!-- SCREEN 2: Quiz -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-header">
      <div class="player-info">
        <span id="player-name" class="player-name"></span>
        <span id="reaction-msg" class="reaction-msg"></span>
      </div>
      <div class="quiz-meta">
        <span id="question-counter" class="question-counter">1/10</span>
        <span id="score-display" class="score-display">0 pts</span>
      </div>
    </div>

    <div class="timer-container">
      <div id="timer-bar" class="timer-bar"></div>
    </div>

    <div id="question-text" class="question-text"></div>

    <div id="options-container" class="options-container"></div>
  </div>

  <!-- SCREEN 3: Results -->
  <div id="screen-results" class="screen">
    <div class="results-container">
      <div class="hero-e small">E</div>
      <h2 class="results-title">EXAM COMPLETE</h2>
      <div id="final-score" class="final-score"></div>
      <div id="final-rank" class="final-rank"></div>
      <div id="correct-count" class="correct-count"></div>
      <button id="play-again-btn" class="btn-primary">PLAY AGAIN</button>
      <a href="/leaderboard" class="leaderboard-link">VIEW LEADERBOARD</a>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
